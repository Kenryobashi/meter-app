<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>メーター記録</title>
<meta name="description" content="車両のメーター値を毎日記録するアプリ">
<meta name="theme-color" content="#242832">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="メーター">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg: #1b1e25;
    --panel: #242832;
    --panel-raised: #2c313d;
    --bezel: #14161b;
    --hairline: #383d48;
    --text: #eceae3;
    --text-dim: #8b91a0;
    --amber: #ffb454;
    --amber-glow: rgba(255,180,84,0.45);
    --mint: #6fd3a0;
    --danger: #e07a6a;
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .num{
    font-family: "SF Mono", "Roboto Mono", "JetBrains Mono", ui-monospace, monospace;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  @media (prefers-reduced-motion: no-preference){
    .savePulse{ animation: pulse 0.5s ease; }
  }
  @keyframes pulse{
    0%{ transform: scale(1); }
    40%{ transform: scale(1.015); }
    100%{ transform: scale(1); }
  }

  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 48px;
  }

  header.top{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 18px;
  }
  header.top .label{ font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; }
  header.top .date{ font-size: 15px; font-weight: 600; }

  .odo-card{
    background: var(--panel);
    border-radius: var(--radius);
    border: 1px solid var(--hairline);
    padding: 18px 18px 20px;
    margin-bottom: 16px;
  }
  .odo-row{ margin-bottom: 14px; }
  .odo-row:last-child{ margin-bottom: 0; }
  .odo-row .row-label{
    font-size: 12px; color: var(--text-dim); margin-bottom: 6px;
    display:flex; justify-content: space-between;
  }

  .odo-display{
    background: var(--bezel);
    border-radius: 8px;
    padding: 10px 14px;
    display:flex; align-items:center; justify-content: flex-end;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.02);
  }
  .odo-display .digits{
    font-size: 28px;
    color: var(--text-dim);
  }
  .odo-display.live .digits{
    color: var(--amber);
    text-shadow: 0 0 10px var(--amber-glow);
  }
  .odo-display input{
    background: transparent;
    border: none;
    outline: none;
    color: var(--amber);
    text-shadow: 0 0 10px var(--amber-glow);
    font-size: 28px;
    text-align: right;
    width: 100%;
    -webkit-appearance: none;
    appearance: textfield;
  }
  .odo-display input::placeholder{ color: #5a5142; opacity: 0.7; }
  .odo-display input:focus-visible{
    outline: 2px solid var(--amber);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .unit{ font-size: 12px; color: var(--text-dim); margin-left: 8px; align-self: flex-end; padding-bottom: 4px;}

  .trip-readout{
    margin-top: 14px;
    display:flex; align-items:center; justify-content: space-between;
    padding: 12px 14px;
    background: var(--panel-raised);
    border-radius: 8px;
  }
  .trip-readout .t-label{ font-size: 13px; color: var(--text-dim); }
  .trip-readout .t-value{ font-size: 22px; color: var(--mint); }
  .trip-readout .t-value.zero{ color: var(--text-dim); }
  .trip-readout .t-value.warn{ color: var(--danger); }

  button{
    font-family: inherit;
    border: none;
    cursor: pointer;
  }
  .btn-primary{
    width: 100%;
    margin-top: 14px;
    padding: 13px 0;
    border-radius: 10px;
    background: var(--amber);
    color: #2a1d0c;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .btn-primary:disabled{ opacity: 0.4; cursor: default; }
  .btn-primary:focus-visible{ outline: 2px solid #fff; outline-offset: 2px; }

  .past-fields{
    display: flex;
    gap: 8px;
  }
  input.past-date{
    flex: 0 0 130px;
    background: var(--bezel);
    color: var(--text);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 0 10px;
    font-size: 13px;
    font-family: inherit;
    color-scheme: dark;
  }
  .past-fields .odo-display{ flex: 1; }
  .past-fields .odo-display input{ font-size: 18px; }

  .setup-note{
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-top: 10px;
  }

  section.log{
    margin-top: 26px;
  }
  section.log h2{
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.06em;
    margin: 0 0 10px 2px;
  }
  table.log-table{
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--hairline);
  }
  table.log-table th, table.log-table td{
    padding: 10px 10px;
    text-align: right;
    font-size: 13.5px;
    border-bottom: 1px solid var(--hairline);
  }
  table.log-table tr:last-child td{ border-bottom: none; }
  table.log-table th{
    text-align: right;
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11.5px;
  }
  table.log-table td.day-cell, table.log-table th.day-cell{ text-align: left; }
  table.log-table td.day-cell{ color: var(--text); }
  table.log-table td.dist-cell{ color: var(--mint); }
  table.log-table tr.today-row td{ color: var(--amber); }
  table.log-table .editbtn{
    background: none; color: var(--text-dim); font-size: 12px;
    padding: 4px 6px; border-radius: 6px;
  }
  table.log-table .editbtn:hover{ background: var(--panel-raised); }

  .empty-state{
    font-size: 13px;
    color: var(--text-dim);
    padding: 18px 4px;
    text-align: center;
  }

  .export-card{
    margin-top: 16px;
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .export-card h2{
    font-size: 13px; color: var(--text-dim); font-weight:600;
    letter-spacing:0.06em; margin: 0 0 10px 0;
  }
  textarea.export-area{
    width: 100%;
    min-height: 120px;
    background: var(--bezel);
    color: var(--text);
    border: 1px solid var(--hairline);
    border-radius: 8px;
    padding: 10px;
    font-size: 12.5px;
    line-height: 1.7;
    resize: vertical;
    font-family: "SF Mono", "Roboto Mono", monospace;
  }
  .btn-secondary{
    margin-top: 10px;
    width: 100%;
    padding: 11px 0;
    border-radius: 9px;
    background: var(--panel-raised);
    color: var(--text);
    font-size: 14px;
    border: 1px solid var(--hairline);
  }
  .btn-secondary:active{ background: var(--bezel); }
  .toast{
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    background: var(--mint);
    color: #10271b;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .toast.show{ opacity: 1; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="label">メーター記録</div>
      <div class="date num" id="todayLabel">--</div>
    </div>
  </header>

  <div class="odo-card" id="setupCard" style="display:none;">
    <div class="odo-row">
      <div class="row-label"><span>初回設定：現在のメーター</span></div>
      <div class="odo-display live">
        <input type="number" inputmode="numeric" id="setupInput" placeholder="例: 65891" class="num">
        <span class="unit">km</span>
      </div>
    </div>
    <button class="btn-primary" id="setupSaveBtn">これで開始する</button>
    <div class="setup-note">最初に現在のメーター値を1回だけ入力してください。次回以降は前日の終わり値を自動で使います。</div>
  </div>

  <div class="odo-card" id="mainCard" style="display:none;">
    <div class="odo-row">
      <div class="row-label"><span>前日終わり（朝の開始値）</span></div>
      <div class="odo-display">
        <span class="digits num" id="prevMeterDisplay">--</span>
        <span class="unit">km</span>
      </div>
    </div>
    <div class="odo-row">
      <div class="row-label"><span id="endRowLabel">本日終わりメーター</span></div>
      <div class="odo-display live">
        <input type="number" inputmode="numeric" id="endInput" placeholder="km" class="num">
        <span class="unit">km</span>
      </div>
    </div>

    <div class="trip-readout">
      <span class="t-label">本日の走行距離</span>
      <span class="t-value zero num" id="tripValue">― km</span>
    </div>

    <button class="btn-primary" id="saveBtn" disabled>本日の記録を保存</button>
  </div>

  <div class="odo-card" id="pastCard">
    <div class="odo-row">
      <div class="row-label"><span>過去の記録を追加・修正</span></div>
      <div class="past-fields">
        <input type="date" id="pastDateInput" class="past-date">
        <div class="odo-display live">
          <input type="number" inputmode="numeric" id="pastMeterInput" placeholder="終わりメーター km" class="num">
          <span class="unit">km</span>
        </div>
      </div>
    </div>
    <div class="t-value warn num" id="pastWarn" style="display:none; font-size: 13px; margin-bottom: 6px;"></div>
    <button class="btn-secondary" id="pastSaveBtn">この日の記録を保存</button>
  </div>

  <section class="log">
    <h2>履歴</h2>
    <table class="log-table" id="logTable">
      <thead>
        <tr>
          <th class="day-cell">日付</th>
          <th>終わりメーター</th>
          <th>距離</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">記録はまだありません</div>
  </section>

  <div class="export-card">
    <h2>コピー用テキスト（直近7日）</h2>
    <textarea class="export-area num" id="exportArea" readonly></textarea>
    <button class="btn-secondary" id="copyBtn">コピーする</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'vehicle-meter-log';
const WEEKDAYS = ['日','月','火','水','木','金','土'];

let state = { entries: {} }; // { "YYYY-MM-DD": endMeterNumber }

function pad(n){ return n.toString().padStart(2,'0'); }
function dateStr(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function todayStr(){ return dateStr(new Date()); }
function fmtLabel(ds){
  const d = new Date(ds + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}（${WEEKDAYS[d.getDay()]}）`;
}

function sortedDates(){
  return Object.keys(state.entries).sort();
}

function prevEntryBefore(ds){
  const dates = sortedDates().filter(d => d < ds);
  if(dates.length === 0) return null;
  const last = dates[dates.length-1];
  return { date: last, meter: state.entries[last] };
}

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      state = JSON.parse(raw);
      if(!state.entries) state.entries = {};
    }
  }catch(e){
    state = { entries: {} };
  }
}

async function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    showToast('保存に失敗しました');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1600);
}

function renderToday(){
  const ds = todayStr();
  document.getElementById('todayLabel').textContent = fmtLabel(ds);

  const hasAnyEntry = sortedDates().length > 0;
  const setupCard = document.getElementById('setupCard');
  const mainCard = document.getElementById('mainCard');

  if(!hasAnyEntry){
    setupCard.style.display = 'block';
    mainCard.style.display = 'none';
    return;
  }
  setupCard.style.display = 'none';
  mainCard.style.display = 'block';

  const prev = prevEntryBefore(ds);
  const prevMeter = prev ? prev.meter : null;
  document.getElementById('prevMeterDisplay').textContent = prevMeter !== null ? prevMeter.toLocaleString() : '記録なし';

  const endInput = document.getElementById('endInput');
  const existingToday = state.entries[ds];
  document.getElementById('endRowLabel').textContent = existingToday !== undefined ? '本日終わりメーター（編集）' : '本日終わりメーター';
  if(existingToday !== undefined && endInput.value === '') endInput.value = existingToday;

  updateTrip();
}

function updateTrip(){
  const ds = todayStr();
  const prev = prevEntryBefore(ds);
  const endInput = document.getElementById('endInput');
  const tripEl = document.getElementById('tripValue');
  const saveBtn = document.getElementById('saveBtn');

  const endVal = parseFloat(endInput.value);
  if(isNaN(endVal) || !prev){
    tripEl.textContent = '― km';
    tripEl.className = 't-value zero num';
    saveBtn.disabled = true;
    return;
  }
  const diff = endVal - prev.meter;
  if(diff < 0){
    tripEl.textContent = '前日より小さい値';
    tripEl.className = 't-value warn num';
    saveBtn.disabled = true;
    return;
  }
  tripEl.textContent = `${diff.toLocaleString()} km`;
  tripEl.className = 't-value num';
  saveBtn.disabled = false;
}

function renderLog(){
  const body = document.getElementById('logBody');
  const empty = document.getElementById('emptyState');
  const dates = sortedDates().sort().reverse().slice(0, 30);
  body.innerHTML = '';

  if(dates.length === 0){
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  dates.forEach(ds => {
    const prev = prevEntryBefore(ds);
    const meter = state.entries[ds];
    const dist = prev ? (meter - prev.meter) : null;
    const tr = document.createElement('tr');
    if(ds === todayStr()) tr.className = 'today-row';
    tr.innerHTML = `
      <td class="day-cell num">${fmtLabel(ds)}</td>
      <td class="num">${meter.toLocaleString()}</td>
      <td class="dist-cell num">${dist !== null ? dist.toLocaleString()+' km' : '―'}</td>
      <td><button class="editbtn" data-date="${ds}">編集</button></td>
    `;
    body.appendChild(tr);
  });

  body.querySelectorAll('.editbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ds = btn.getAttribute('data-date');
      const current = state.entries[ds];
      const next = prompt(`${fmtLabel(ds)} の終わりメーターを修正`, current);
      if(next === null) return;
      const num = parseFloat(next);
      if(isNaN(num)) return;
      state.entries[ds] = num;
      saveState().then(() => { renderAll(); });
    });
  });
}

function renderExport(){
  const dates = sortedDates().sort().reverse().slice(0,7).reverse();
  const lines = dates.map(ds => {
    const prev = prevEntryBefore(ds);
    const meter = state.entries[ds];
    const dist = prev ? (meter - prev.meter) : null;
    const distStr = dist !== null ? `${dist}km` : '―';
    return `${fmtLabel(ds)}\t終わり ${meter.toLocaleString()}km\t走行 ${distStr}`;
  });
  document.getElementById('exportArea').value = lines.join('\n');
}

function renderAll(){
  renderToday();
  renderLog();
  renderExport();
}

document.getElementById('endInput').addEventListener('input', updateTrip);

document.getElementById('saveBtn').addEventListener('click', async () => {
  const ds = todayStr();
  const endVal = parseFloat(document.getElementById('endInput').value);
  if(isNaN(endVal)) return;
  state.entries[ds] = endVal;
  await saveState();
  document.getElementById('saveBtn').classList.add('savePulse');
  setTimeout(()=> document.getElementById('saveBtn').classList.remove('savePulse'), 500);
  showToast('保存しました');
  renderAll();
});

document.getElementById('setupSaveBtn').addEventListener('click', async () => {
  const val = parseFloat(document.getElementById('setupInput').value);
  if(isNaN(val)) { showToast('数値を入力してください'); return; }
  const ds = todayStr();
  state.entries[ds] = val;
  await saveState();
  showToast('開始しました');
  renderAll();
});

function nextEntryAfter(ds){
  const dates = sortedDates().filter(d => d > ds);
  if(dates.length === 0) return null;
  const first = dates[0];
  return { date: first, meter: state.entries[first] };
}

function checkPastInput(){
  const ds = document.getElementById('pastDateInput').value;
  const meterVal = parseFloat(document.getElementById('pastMeterInput').value);
  const warnEl = document.getElementById('pastWarn');
  const btn = document.getElementById('pastSaveBtn');
  warnEl.style.display = 'none';
  btn.disabled = false;

  if(!ds || isNaN(meterVal)) return;

  const prev = prevEntryBefore(ds);
  const next = nextEntryAfter(ds);
  let msg = '';
  if(prev && meterVal < prev.meter) msg = `${fmtLabel(prev.date)}（${prev.meter.toLocaleString()}km）より小さい値です`;
  if(next && meterVal > next.meter) msg = `${fmtLabel(next.date)}（${next.meter.toLocaleString()}km）より大きい値です`;

  if(msg){
    warnEl.textContent = msg;
    warnEl.style.display = 'block';
  }
}

document.getElementById('pastDateInput').addEventListener('input', checkPastInput);
document.getElementById('pastMeterInput').addEventListener('input', checkPastInput);

document.getElementById('pastSaveBtn').addEventListener('click', async () => {
  const ds = document.getElementById('pastDateInput').value;
  const meterVal = parseFloat(document.getElementById('pastMeterInput').value);
  if(!ds){ showToast('日付を選んでください'); return; }
  if(isNaN(meterVal)){ showToast('メーター値を入力してください'); return; }

  state.entries[ds] = meterVal;
  await saveState();
  document.getElementById('pastMeterInput').value = '';
  document.getElementById('pastWarn').style.display = 'none';
  showToast(`${fmtLabel(ds)} を保存しました`);
  renderAll();
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = document.getElementById('exportArea').value;
  try{
    await navigator.clipboard.writeText(text);
    showToast('コピーしました');
  }catch(e){
    showToast('コピーできませんでした');
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

(async function init(){
  await loadState();
  const pastInput = document.getElementById('pastDateInput');
  pastInput.max = todayStr();
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  pastInput.value = dateStr(yesterday);
  renderAll();
})();
</script>
</body>
</html>
